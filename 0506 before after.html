<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>

    p{
      background-color: #0f0;
    }
    p::before{
      content:'be';
      display: block;      
      height: 100px;
      
      position: absolute;
      top: 30px;
      bottom: 50px;
      margin: auto;
    }

    p::after{
      content:'af';      
      display: inline-block;
      height: 100px;
      background-color: #f00;

    }

    div{
      background-color: #f00;
    }
    div::before{
      content:url(LineIcon.png);
      /* background-image: url(qwe.jpg); */
      /* content:''; */
      overflow:hidden;
      display: block;
      width: 100px;
      height: 100px;
      background-color: #00f;
    }
    div::after{
      content:'af';
      display: inline-block;
    }

  </style>


</head>

<body>

  <p>嗨  Lorem ipsum dolor sit amet consectetur adipisicing elit. Debitis voluptatem eos ab vitae, nostrum repellendus neque temporibus exercitationem nisi libero eaque asperiores, omnis quis in maiores! Rem totam tenetur vitae?
  </p>
  <div></div>


</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <!-- flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_orange.css">
    <!-- #FF8A65 可以載下來改色-->
    <!-- #fc8d61 網站顏色-->
    <style>
        .orange{
            line-height: 1.5;
            text-align: center;
            text-decoration: none;
            color: #fff;

            vertical-align: middle;

            padding: .375rem .75rem;
            font-size: 1rem;
            border-radius: .25rem;
        
            background-color:#FF8A65;
            border:none;
        }
        button:not(:disabled):hover{
            box-shadow: 2px 3px 2px #aaa;
            transform: translate(-3px ,-2px) scaleY(1.05);
        }
        .modal-content{
            min-width: 340px;
        }
                
        /* input.flatpickr */
        #datePicker{
            display: none;
        }
        .flatpickr-calendar.rangeMode{
            width: 100%;
        }
        .flatpickr-rContainer{
            width: 100%;
        }
        .flatpickr-days{
            width: 100%;
        }
        .dayContainer{
            width: 100%;
            max-width: none;
        }
        .flatpickr-day{
            height: auto;
            max-width: none;
            aspect-ratio: 1/1;
            padding-top: calc(7.14285% - 18px);
        }

    </style>


    <title>pickrModal</title>
</head>
<body>

    <!-- Button trigger modal -->
    <button type="button" id="setDate" class="orange" data-bs-toggle="modal" data-bs-target="#DateModal">
        Launch demo
    </button>

    <!-- DateModal -->
    <div class="modal fade" id="DateModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-center w-100" id="exampleModalLabel">設定起訖日</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body d-flex justify-content-center">
                    <input class="flatpickr" type=text placeholder="Select Date 啦"  id="datePicker">
                </div>
                <div class="modal-footer" >    
                    <button  class=" orange" data-bs-toggle="modal" data-bs-target="#TimeModal">繼續設定時間
                    </button>
                </div>
            </div>
        </div>
    </div>



    <!-- TimeModal -->
    <div class="modal fade" id="TimeModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-titl text-center w-100" id="exampleModalLabel">設定時間</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="start"></div>
                    <input class="flatpickr TimePicker" type=text placeholder="選時間..."  id="startTimePicker">
        
                    <div id="end"></div>
                    <input class="flatpickr TimePicker" type=text placeholder="選時間..."  id="endTimePicker">

                </div>
                <div class="modal-footer">
                    <button type="button" class="orange"  id="complete" data-bs-dismiss="modal">確定</button>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        let DateModalLauncher = document.querySelector('button[data-bs-target="#DateModal"]');
        let TimeModalLauncher = document.querySelector('button[data-bs-target="#TimeModal"]');
        let completeBtn = document.querySelector('#complete');

        DateModalLauncher.addEventListener('click',function(){
            let sD = datePicker.selectedDates;
            if (sD.length == 2 && sD[1]>sD[0]){
                TimeModalLauncher.disabled =  false;
            }else{
                TimeModalLauncher.disabled =  true;
            }
        });

        TimeModalLauncher.addEventListener('click',function(){
            if (TimePicker[0].selectedDates.length==1 && TimePicker[1].selectedDates.length==1){
                completeBtn.disabled =  false;
            }else{
                completeBtn.disabled =  true;
            }
        });

        const datePicker = flatpickr("#datePicker", {
            mode: "range",
            dateFormat: "Y\\年m\\月d\\日",
            // altInput: true,
            // altFormat: "F j, Y",

            minDate: new Date(),
            disable: ["2021-08-11", new Date(2021, 7, 19) ],

            inline:true,


            onChange: function( selectedDates, dateStr, instance) {//固定的參數群
                if (selectedDates.length == 2 && selectedDates[1]>selectedDates[0]){
                    TimeModalLauncher.disabled =  false;
                }else{
                    TimeModalLauncher.disabled =  true;
                }
                let s = flatpickr.formatDate(selectedDates[0], instance.config.dateFormat);
                let e = flatpickr.formatDate(selectedDates[1], instance.config.dateFormat);

                document.querySelector("#start").innerHTML= "從：" + s;
                document.querySelector("#end").innerHTML=  "到：" + e;
            },
        });



        const TimePicker = flatpickr(".TimePicker", {
            enableTime: true,
            noCalendar: true,
            dateFormat: "H:i",
            time_24hr: true,
            minTime: "08:00",
            maxTime: "22:30",

            onChange: function( selectedDates, dateStr, instance) {//固定的參數群
                if (TimePicker[0].selectedDates.length==1 && TimePicker[1].selectedDates.length==1){
                    completeBtn.disabled =  false;
                }else{
                    completeBtn.disabled =  true;
                }
            }
        });
        

        // const startTimePicker = flatpickr("#startTimePicker", {
        // });

        // const endTimePicker = flatpickr("#endTimePicker", {
        // });

        completeBtn.addEventListener('click', function(){
            console.log('a');
            var DateModalEl = document.getElementById('DateModal');
            var DateModal = bootstrap.Modal.getInstance(DateModalEl);
            DateModal.hide();

            let a = document.querySelectorAll('.modal-backdrop.fade.show');
            a.forEach(x=>x.classList.Remove('show'));

        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous"></script>


</body>
</html>

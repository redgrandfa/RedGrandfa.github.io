<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .header{
      background-color: #833;
      position: relative;
      padding: 10px;
      margin-bottom: 20px;
    }
    .header .container{
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    .logo{
      display: block;
      width: 70px;
      height: 40px;
      background-color: #faa;
    }
    #menu-control{
      display: none;
    }
    .main-nav a{
      text-decoration: none;
      padding: 10px;
      font-size: 20px;
      color: #f00;
    }

  @media screen and (max-width:991px){
    .hb{
      width: 40px;
      height: 40px;
      border: none;
      position: relative;
      background-color: #000;
    }
    .hb span{
      width: 32px;
      height: 2px;
      background-color: #fff;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      margin: auto;
    }
    .hb span:first-child{
      transform: translateY(-10px);
    }
    .hb span:last-child{
      transform: translateY(10px);
    }
    .main-nav{
      background-color: #fa0;
      width: 100%;
      position: absolute;
      top: 100%;
      display: none;
    }
    .main-nav a{
      display: block;
    }
    #menu-control:checked~ .header .main-nav{
      display: block;
    }
  }
  @media screen and (min-width:992px){
    .hb{
      display: none;
    }
    .main-nav{
      display: flex;
      align-items: center;
    }
    .main-nav a{
    }
  }


  </style>
</head>
<body>
  <input type="checkbox" id="menu-control">

  <div class="header">
    <div class="container">
      <a href="#" class="logo">logo</a>
      <label class="hb" for="menu-control">
        <span></span>
        <span></span>
        <span></span>
      </label>

      <nav class="main-nav">
        <a href="">menu item</a>
        <a href="">menu item</a>
        <a href="">menu item</a>
        <a href="">menu item</a>
        <a href="">menu item</a>
      </nav>
    </div>
  </div>


<p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Maxime ad nihil distinctio iusto deleniti ullam tenetur, incidunt fuga totam rem, sit ipsa facilis non fugiat natus! Error voluptatibus eius architecto?</p>

</body>
</html>

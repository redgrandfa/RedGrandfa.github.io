<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    nav{
      background-color: #000;
      /* display: flex; */
    }
    nav a{
      background-color: #ff0;
      display: block;
      width: 50px;
      margin-bottom: 10px;
    }
    h2{
      /* display: flex; */
      position: relative;
    }
    h2::after{
      content:'';
      display: block;
      background-color: #f00;
      width: 40px;
      height: 3px;
      position: absolute  ;
      left: 30%;
      /* margin: auto; */
    }
    ul{
      display: flex;
    }
    li{
      list-style: none;
    }
    li a{
      padding: 10px;
      display: block;
      border-bottom: 2px dotted transparent;
      text-decoration: none;
    }
    .active a{
      /* border-bottom: 10px solid #000; */
      border-bottom-color:  #000;
    }

  </style>

</head>

<body>
  <nav>
    <a href="#">link</a>
    <a href="#">link</a>
  </nav>
  <h2>qweeereeszdzggg</h2>

  <ul>
    <li class="active"><a  href="#">1</a></li>
    <li>      <a href="#">2</a>    </li>
    <li>      <a href="#">3</a>    </li>
  </ul>



</body>
</html>

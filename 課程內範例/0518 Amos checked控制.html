<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box{
      width: 100px;
      height: 100px;
      background-color: #f00;
    }
    #cc:checked~label{color: blueviolet;}
    #cc:checked~.box{
      background-color: #00f;
    }

  </style>
</head>
<body>
  <input type="checkbox" id="cc">
  
  <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Reiciendis totam delectus ducimus, explicabo labore impedit eos sequi ipsa, autem dolor optio porro corrupti! Facere iusto sit aspernatur quasi, cum exercitationem!</p>

  <label for="cc">控制</label>
  <div class="box"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .box{
      /* width: 600px; */
      width: 80%;
      height: 400px;
      background-color: #333;      
      display: flex;
      flex-wrap: wrap;

    }
    .item{
      /* width: 100px;*/
      max-width: 150px;
      flex-basis: 0px; 
      height: 100px;
      margin: 5px;
      background-color: #f00;
      font-size: 60px;
      
    }
    .item1{
      /* order:1; */
      flex-grow: 1;
      flex-shrink: 0;
    }
    .item2{
      flex-grow: 3;
    }
    .item3{
      flex-grow: 1;
    }
  </style>

</head>

<body>
  <div class="box">
      <div class="item item1">1</div>
      <div class="item item2">2</div>
      <div class="item item3">3</div>
  </div>
  
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-+0n0xVW2eSR5OomGNYDnhzAbDsOXxcvSN1TPprVMTNDbiYZCxYbOOl7+AMvyTG2x" crossorigin="anonymous">

    <title>calculator</title>
    <style>
      *{
        margin: 0;
        padding: 0;
      }
      .box{
        background-color: #bef;
        margin: 0px auto;

        width: 70vh;
        height: 100vh;
        min-width: 210px;
        min-height: 300px;
        box-sizing: border-box;
        padding: 6vh;

      }
      .input{
        border: #000 1px solid;
        font-size: 7vh;
        text-align: end;
        box-sizing: border-box;
        width: 58vh;
        height: 10vh;

      }
      .keyboard{
        width: 58vh;
        height: 72vh;
        border: #000 1px solid;
        margin-top: 6vh;
        padding: 2vh;

      }
      .btn{
        font-size: 5vh;
        width: 12vh;
        height: 12vh;
        text-align: center;
        border-radius:7%;
      }
    </style>
  </head>
  <body>
    <div class="box d-flex flex-column align-items-center">
      <input type="text" class="input" 
      value="(4.4+3.3)/(2.2-1.1)">
      <!-- -8 -->
      <!-- (((6) -->
      <!-- (((4.4+3.3) -->
      <!-- ((((4.4+3.3)/(2.2-1.1)) -->

      
      <div class="keyboard d-flex flex-wrap justify-content-between align-content-between">
        <button class="btn btn-danger" id="clear">C</button>
        <button class="btn btn-danger" id="back">></button>
        <button class="btn btn-danger" id="evaluate">=</button>
        <button class="btn btn-primary">+</button>

        <button class="btn btn-dark">1</button>
        <button class="btn btn-dark">2</button>
        <button class="btn btn-dark">3</button>
        <button class="btn btn-primary">-</button>
        
        <button class="btn btn-dark">4</button>
        <button class="btn btn-dark">5</button>
        <button class="btn btn-dark">6</button>
        <button class="btn btn-primary">x</button>
        
        <button class="btn btn-dark">7</button>
        <button class="btn btn-dark">8</button>
        <button class="btn btn-dark">9</button>
        <button class="btn btn-primary">/</button>
        
        <button class="btn btn-warning">(</button>
        <button class="btn btn-dark">0</button>
        <button class="btn btn-dark" id="dot">.</button>
        <button class="btn btn-warning">)</button>
        

      </div>
    </div>
    <p>註1.沒有先乘除後加減的判斷，只以小括號來改變運算順序</p>
    <p>註2.沒有正負號功能</p>

    <script>
      let input = document.querySelector('input');
      let keyInBtns = document.querySelectorAll('.btn:not(.btn-danger,#dot)');
      
      keyInBtns.forEach( k=>{
          k.addEventListener('click', ()=>{keyIn()});
      });
      function keyIn(){
        input.value += event.target.innerText;
      }

      document.querySelector('#dot').addEventListener('click', ()=>{keyInDot()});
      function keyInDot(){
        let last = input.value[input.value.length-1];
        if( !(last>='0' && last<='9') ){
          input.value += '0';//補個位數0
        }
        keyIn();
      }


      document.querySelector('#clear').addEventListener('click',()=>{clear()});
      function clear(){
        input.value ="";
      }

      document.querySelector('#back').addEventListener('click',()=>{back()});
      function back(){
        let tmp = input.value;
        input.value = tmp.substring(0,tmp.length-1);
      }

      document.querySelector('#evaluate').addEventListener('click',()=>{isEqualTo()});

      let infixExpr;
      let pos;
      let operators=['+','-','x','/'];
      let PrefixEXPR=[];

      
      //運算-----------------------
      function isEqualTo(){
        infixExpr = input.value;
        pos = infixExpr.length-1;
        let tree = EXPR();        
        printPrefix(tree);
        // console.log(tree);
        // console.log(PrefixEXPR);
        let ans = evaluate();
        if (ans != null && ans!='ERROR'){
          input.value = ans;
        }
        PrefixEXPR=[];
      }

      function makeNode(char){
        let node = {L:null, data:char ,R:null};
        return node;
      } 
      
      //演算法
      // FACTOR= NUM | (EXPR)
      // EXPR = FACTOR | FACTOR OP FACTOR

      function FACTOR(){
        let c;
        let node;
        if(pos>=0){
          c=infixExpr[pos--];
          // console.log(c);
          if((c>='0' && c<='9')||c=='.' ){
            //rule: FACTOR= NUM
            let tmp = [];
            do{
              tmp.unshift(c);
              c=infixExpr[pos--];
            }
            while((c>='0' && c<='9')||c=='.')
            pos++;
            // console.log(infixExpr[pos]);
            node = makeNode(tmp.join(''));
          }
          else if(c==')'){

            //rule: FACTOR = (EXPR)
            node = EXPR();
            //防呆+消耗左括號
            if(infixExpr[pos--]!='('){
              alert('錯誤:缺少左括號以成對!');
              return 'ERROR';
            }
          }
          else if(c=='('){
            alert('錯誤:缺少左運算元!');
            return 'ERROR';
          }
          return node;
        }
        else
          return null;
      }

      function EXPR(){
        let c;
        let node;
        let right;
        if (pos>=0){
          //右FACTOR
          right=FACTOR();
          //還有剩 且保留左括號的位置
          if (pos>0){
            c=infixExpr[pos];
            //op、左FACTOR 
            if(operators.includes(c)){
              node = makeNode(c);
              node.R=right;
              pos--;
              //防呆...


              node.L=FACTOR();
            }
            //防呆
            else if(c=='('){
              alert('錯誤:缺少右括號以成對!');
              return 'ERROR'
            }
            else node=right;            
          }
          else node=right;
        }
        return node;
      }

      function printPrefix(tree){
        if(tree!=null){
          //防呆

          //中左右 表達序,組成陣列
          PrefixEXPR.push(tree.data);
          printPrefix(tree.L)
          printPrefix(tree.R);
        }        
      }
      
      function evaluate(){
        let first = PrefixEXPR[0];
        //是運算子
        if( operators.includes(first)){        
          let op = PrefixEXPR.shift();   
          // console.log(`op${op}`);  
          let A = evaluate();//遞迴
          // console.log(`A${A}`);
          if (A==null)
            return null;
          let B = evaluate();//遞迴
          // console.log(`B${B}`);
          if (B==null)
            return null;

          switch(op){
            case '+':
              return parseFloat(A)+parseFloat(B);
            case '-':
              return parseFloat(A)-parseFloat(B);
            case 'x':
              return parseFloat(A)*parseFloat(B);
            case '/':
              return parseFloat(A)/parseFloat(B);
            default:
              return '錯誤:無設計此運算子';
          }
        }
        //非運算子
        else{
          // 防呆 只能一個小數點
          if(Array.from(first).filter( c => c =='.').length>1){
            alert('錯誤:小數點數量異常');
            return null;
          }
          else
            return PrefixEXPR.shift();//取出第一個 
        }
      }

    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-gtEjrD/SeCtmISkJkNUaaKMoLD0//ElJ19smozuHV6z3Iehds+3Ulb9Bn9Plx0x4" crossorigin="anonymous"></script>
  </body>
</html>
